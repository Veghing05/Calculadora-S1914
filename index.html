<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F.N.S Tactical S1914</title>

<style>
:root{
  --blue:#00d2ff;
  --green:#39ff14;
  --red:#ff3131;
  --bg:#05070a;
  --panel:#0d1117;
  --border:#21262d;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
  color:white;
  margin:0;
  padding:14px;
}

.container{ max-width:680px; margin:auto; }

header{ text-align:center; margin-bottom:18px; }

h1{ color:var(--blue); margin:0; letter-spacing:2px; }

.subtitle{ font-size:11px; color:#8b949e; }

.box{
  background:var(--panel);
  padding:16px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:16px;
}

h3{ margin:0 0 12px 0; font-size:15px; }

label{
  font-size:11px;
  text-transform:uppercase;
  color:#aaa;
  margin-top:10px;
  display:block;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:5px;
  background:#000;
  color:white;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:15px;
}

.btn-group{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  padding:15px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  text-transform:uppercase;
  cursor:pointer;
  font-size:14px;
}

.calc{ background:var(--blue); color:black; grid-column:span 2; }
.invert{ background:#ffaa00; color:black; grid-column:span 2; }
.clear{ background:#333; color:white; }
.whats{ background:#25D366; color:black; }

#advantageBar{
  height:10px;
  background:#222;
  border-radius:6px;
  margin-top:12px;
  overflow:hidden;
  display:none;
}

#advantageFill{
  height:100%;
  width:50%;
  background:var(--green);
  transition:.4s;
}

#res{
  margin-top:18px;
  background:#000;
  padding:16px;
  border-radius:10px;
  font-family:monospace;
  font-size:13px;
  line-height:1.55em;
  display:none;
  border:1px solid var(--blue);
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>🌐 F.N.S SIMULADOR TACTICAL</h1>
<div class="subtitle">Simulador de Combate</div>
</header>

<div class="box">
<h3 style="color:var(--green)">🟦 FORÇA ALIADA</h3>

<label>Nome</label>
<input id="aName" placeholder="Ex: Alemanha">

<label>Postura</label>
<select id="aPostura">
<option value="atacar">ATACANDO</option>
<option value="defender">DEFENDENDO</option>
</select>

<label>Tropas</label>
<input id="aQtd" type="number">

<label>HP TOTAL</label>
<input id="aHP" type="number">

<label>Dano TOTAL</label>
<input id="aDmg" type="number">
</div>

<div class="box">
<h3 style="color:var(--red)">🟥 FORÇA INIMIGA</h3>

<label>Nome</label>
<input id="bName" placeholder="Ex: França">

<label>Postura</label>
<select id="bPostura">
<option value="defender">DEFENDENDO</option>
<option value="atacar">ATACANDO</option>
</select>

<label>Tropas</label>
<input id="bQtd" type="number">

<label>HP TOTAL</label>
<input id="bHP" type="number">

<label>Dano TOTAL</label>
<input id="bDmg" type="number">

<label>🧱 Forte do Defensor (%)</label>
<input id="fort" type="number" value="0">
</div>

<div class="btn-group">
<button class="calc" onclick="simular()">⚔️ SIMULAR</button>
<button class="invert" onclick="inverter()">🔄 INVERTER</button>
<button class="clear" onclick="limpar()">🗑️ LIMPAR</button>
<button class="whats" onclick="exportar()">📲 EXPORTAR</button>
</div>

<div id="advantageBar">
<div id="advantageFill"></div>
</div>

<div id="res"></div>

</div>

<script>
let relatorio="";

function simular(){

const v=id=>document.getElementById(id).value;
const n=id=>parseFloat(v(id))||0;

let na=v("aName")||"Aliados";
let nb=v("bName")||"Inimigos";

let qa=n("aQtd"), qb=n("bQtd");
let ha=n("aHP"), hb=n("bHP");
let da=n("aDmg"), db=n("bDmg");

let postA=v("aPostura");
let postB=v("bPostura");
let fort=n("fort")/100;

if(qa<=0||qb<=0||ha<=0||hb<=0){
mostrar("⚠️ Dados inválidos.");
return;
}

if(postA===postB){
mostrar("⚠️ Um deve atacar e o outro defender.");
return;
}

let hpA=ha, hpB=hb;
let hora=0, log="";

let propA=ha/qa, propB=hb/qb;

while(hpA>0 && hpB>0 && hora<48){

hora++;

let danoA=da*(hpA/ha);
let danoB=db*(hpB/hb);

if(postB==="defender") danoA*=(1-fort);
if(postA==="defender") danoB*=(1-fort);

hpB-=danoA;
hpA-=danoB;

let tA=Math.ceil(Math.max(0,hpA)/propA);
let tB=Math.ceil(Math.max(0,hpB)/propB);

log+=`H${hora.toString().padStart(2,'0')} → ${tA} vs ${tB}\n`;
}

let finalA=Math.ceil(Math.max(0,hpA)/propA);
let finalB=Math.ceil(Math.max(0,hpB)/propB);

let perdasA=qa-finalA;
let perdasB=qb-finalB;

let vencedor="⚖️ EMPATE";
let vantagem=50;
let cor="var(--green)";

if(finalA>finalB){ vencedor="🏆 "+na.toUpperCase(); vantagem=70; }
else if(finalB>finalA){ vencedor="🏆 "+nb.toUpperCase(); vantagem=30; cor="var(--red)"; }

document.getElementById("advantageBar").style.display="block";
let fill=document.getElementById("advantageFill");
fill.style.width=vantagem+"%";
fill.style.background=cor;

relatorio=
`⚔️ RELATÓRIO DE COMBATE
━━━━━━━━━━━━━━━━━━
${na.toUpperCase()} ➜ ${finalA}/${qa} (-${perdasA})
HP: ${Math.ceil(Math.max(0,hpA))}

${nb.toUpperCase()} ➜ ${finalB}/${qb} (-${perdasB})
HP: ${Math.ceil(Math.max(0,hpB))}
━━━━━━━━━━━━━━━━━━
RESULTADO: ${vencedor}
DURAÇÃO: ${hora}h
━━━━━━━━━━━━━━━━━━
LOG:
${log}`;

mostrar(relatorio);
}

function inverter(){
["Name","Qtd","HP","Dmg","Postura"].forEach(f=>{
let a=document.getElementById("a"+f);
let b=document.getElementById("b"+f);
[a.value,b.value]=[b.value,a.value];
});
}

function mostrar(txt){
let d=document.getElementById("res");
d.innerHTML=txt.replace(/\n/g,"<br>");
d.style.display="block";
d.scrollIntoView({behavior:"smooth"});
}

function exportar(){
if(!relatorio){alert("Simule primeiro.");return;}
window.open("https://wa.me/?text="+encodeURIComponent(relatorio));
}

function limpar(){
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("res").style.display="none";
document.getElementById("advantageBar").style.display="none";
relatorio="";
}
</script>

</body>
</html>
