<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1914 - Tactical Report</title>
    <style>
        :root { --accent: #2c3e50; --bg: #0f0f0f; --card: #1a1a1a; --text: #e0e0e0; --win: #2ecc71; --loss: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; font-size: 14px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #333; }
        h2 { color: #fff; text-align: center; font-size: 18px; margin: 0 0 15px 0; border-bottom: 1px solid #fff; padding-bottom: 8px; }
        .section { background: #222; padding: 12px; border-radius: 6px; margin-bottom: 12px; border: 1px solid #444; }
        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }
        label { display: block; font-size: 10px; color: #888; font-weight: bold; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #444; border-radius: 4px; color: #fff; margin-bottom: 10px; box-sizing: border-box; font-size: 14px; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: #fff; font-size: 16px; transition: background 0.2s; }
        .btn-main:hover { background: #34495e; }
        #res { margin-top: 15px; padding: 12px; border-radius: 4px; display: none; background: #111; border: 1px solid #444; }
        .stat { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dotted #333; }
        .win-text { color: var(--win); font-weight: bold; }
        .loss-text { color: var(--loss); font-weight: bold; }
        #copyArea { width: 100%; height: 350px; background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; margin-top: 10px; font-family: monospace; font-size: 12px; display: none; resize: vertical; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 RELATÓRIO DE COMANDO</h2>

    <div class="section">
        <label>LOCAL DA BATALHA</label>
        <input type="text" id="location" value="Khalkhgol" placeholder="Nome da Província">
        
        <div class="row">
            <div>
                <label>SEU PAÍS</label>
                <input type="text" id="myCountry" value="Manchúria" placeholder="Ex: Brasil">
            </div>
            <div>
                <label>PAÍS INIMIGO</label>
                <input type="text" id="enemyCountry" value="Mongólia" placeholder="Ex: Argentina">
            </div>
        </div>
    </div>

    <div class="section">
        <div class="row">
            <div>
                <label>SUA POSTURA</label>
                <select id="myPosture">
                    <option value="Atacando">Atacando</option>
                    <option value="Defendendo">Defendendo</option>
                </select>
                <label>Nº UNIDADES SUAS</label>
                <input type="number" id="mUnits" value="48">
                <label>HP TOTAL</label>
                <input type="number" id="mHP" value="702">
                <label>DANO TOTAL</label>
                <input type="number" id="mAtk" value="210">
            </div>
            <div>
                <label>POSTURA INIMIGO</label>
                <select id="enemyPosture">
                    <option value="Defendendo">Defendendo</option>
                    <option value="Atacando">Atacando</option>
                </select>
                <label>Nº UNIDADES INIMIGO</label>
                <input type="number" id="iUnits" value="10">
                <label>HP TOTAL</label>
                <input type="number" id="iHP" value="200">
                <label>DANO TOTAL</label>
                <input type="number" id="iAtk" value="40">
            </div>
        </div>
        <label>PROTEÇÃO DO FORTE (%) - Se o inimigo estiver defendendo</label>
        <input type="number" id="fort" value="30">
    </div>

    <button class="btn-main" onclick="runSim()">PROCESSAR BATALHA</button>

    <div id="res">
        <div id="summary"></div>
        <textarea id="copyArea" readonly></textarea>
    </div>
</div>

<script>
/**
 * Supremacy 1914 Combat Simulator
 * Revisão: v7.9 - Foco em precisão de cálculos
 */
function runSim() {
    // 1. Coleta de dados
    let location = document.getElementById('location').value;
    let myCountry = document.getElementById('myCountry').value;
    let enemyCountry = document.getElementById('enemyCountry').value;
    let mUnits = document.getElementById('mUnits').value;
    let iUnits = document.getElementById('iUnits').value;
    
    // HP e Dano iniciais
    let mHP = parseFloat(document.getElementById('mHP').value);
    let mAtkBase = parseFloat(document.getElementById('mAtk').value);
    let iHP = parseFloat(document.getElementById('iHP').value);
    let iAtkBase = parseFloat(document.getElementById('iAtk').value);
    
    // Configurações de Postura e Forte
    let fortPerc = parseFloat(document.getElementById('fort').value || 0) / 100;
    let myPosture = document.getElementById('myPosture').value;
    let enemyPosture = document.getElementById('enemyPosture').value;

    // 2. Inicialização da Simulação
    let mHPMax = mHP, iHPMax = iHP, hr = 0, log = "";
    document.getElementById('res').style.display = 'block';

    // 3. Loop de Batalha (Simula hora por hora)
    while (mHP > 0 && iHP > 0 && hr < 24) {
        hr++;
        
        // Dano atual é baseado na proporção de HP restante (Dano/HP)
        let curMAtk = mAtkBase * (mHP / mHPMax);
        let curIAtk = iAtkBase * (iHP / iHPMax);

        // Aplicação de Dano com verificação de Forte
        let finalMAtk = curMAtk;
        let finalIAtk = curIAtk;

        // Se o inimigo está defendendo, o seu ataque é reduzido pelo forte
        if (enemyPosture === 'Defendendo') {
            finalMAtk = curMAtk * (1 - fortPerc);
        }
        
        // Se você está defendendo, o ataque inimigo é reduzido pelo forte
        if (myPosture === 'Defendendo') {
            finalIAtk = curIAtk * (1 - fortPerc);
        }

        iHP -= finalMAtk;
        mHP -= finalIAtk;
        
        log += `Hr ${hr}: ${myCountry} ${Math.max(0, mHP).toFixed(1)} HP | ${enemyCountry} ${Math.max(0, iHP).toFixed(1)} HP\n`;
    }

    // 4. Resultado e Formatação
    let resultStatus = mHP > 0 ? "VITÓRIA ✅" : "DERROTA ❌";
    let losses = Math.ceil((mHPMax - mHP) / 20); // Estimativa de baixas por unidade
    
    document.getElementById('summary').innerHTML = `
        <div class="stat"><span>Local:</span> <span><strong>${location}</strong></span></div>
        <div class="stat"><span>Resultado:</span> <span class="${mHP > 0 ? 'win-text' : 'loss-text'}">${resultStatus}</span></div>
        <div class="stat"><span>Duração:</span> <span>${hr} horas</span></div>
        <div class="stat"><span>Baixas ${myCountry}:</span> <span>~${losses} unidades</span></div>
    `;

    // 5. Gerar texto para copiar (Pronto para Discord/Jornal)
    let reportText = `🎖️ RELATÓRIO DE GUERRA 🎖️\n\n` +
                     `🔥 **ESTADO:** ${resultStatus}\n\n` +
                     `📍 **LOCAL:** ${location}\n` +
                     `🚩 **CONFLITO:** ${myCountry} (${myPosture}) vs ${enemyCountry} (${enemyPosture})\n` +
                     `⚔️ **FORÇAS:** ${mUnits} Unid. ${myCountry} vs ${iUnits} Unid. ${enemyCountry}\n\n` +
                     `⏱️ **TEMPO DE GUERRA:** ${hr} Horas\n` +
                     `🛡️ **HP FINAL ${myCountry}:** ${Math.max(0, mHP).toFixed(1)}\n` +
                     `💀 **BAIXAS:** ~${losses} Unidades\n\n` +
                     `📋 **PREVISÃO:**\n${log}`;
    
    let textArea = document.getElementById('copyArea');
    textArea.value = reportText;
    textArea.style.display = 'block';
}
</script>
</body>
</html>
